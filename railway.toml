[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[[services]]
name = "dashboard"
startCommand = "streamlit run dashboard/pricing_dashboard.py --server.port=8501 --server.address=0.0.0.0"

[[services]]
name = "api"
startCommand = "uvicorn api.main:app --host 0.0.0.0 --port 8000"
```

Also create a `.railwayignore` file to stop Railway from uploading unnecessary files:
